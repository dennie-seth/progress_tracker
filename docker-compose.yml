# Production deployment on the VDS — bot-app, telegram-bot-api, and Postgres
# all on one host, sharing the bot-api data directory so the bot reads source
# files directly off disk (`BOT_API_LOCAL_FILES=true`). No SOCKS, no Basic
# Auth — bot-app reaches bot-api over the internal `telegram_bot` network.
#
# Bring up:   docker compose up -d --build
# Tail logs:  docker compose logs -f bot-app
#
# For local dev against cloud Telegram (no bot-api server), use the
# alternate compose file: `docker compose -f docker-compose.dev.yml up --build`.
#
# Prerequisite: the operator builds the `telegram-bot-api-local` image once
# from the upstream tdlib/telegram-bot-api source. This file does not own
# that build. The bot-api image runs as UID 1000 (`telegram-bot-api`); our
# bot-app runs as UID 1000 too (`appuser`), so the read-only bind mount
# below works without a `chown`.

services:
  telegram-bot-api:
    image: telegram-bot-api-local
    container_name: telegram-bot-api
    restart: unless-stopped
    stop_grace_period: 40s
    # Scope: only the two credentials tdlib actually needs. Avoid `env_file:
    # .env` here because that would leak BOT_TOKEN / DATABASE_URL / SOCKS
    # creds into the bot-api process — anything that compromises tdlib
    # could read them out of /proc/1/environ.
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
    volumes:
      - ./telegram-bot-api-data:/var/lib/telegram-bot-api
    healthcheck:
      # bot-api has no HTTP /health route, but bash supports /dev/tcp/<host>/<port>
      # for cheap reachability probes — succeed iff :8081 accepts a connection.
      # bash is present in the upstream image's ubuntu:22.04 base.
      test: ["CMD", "bash", "-c", "</dev/tcp/127.0.0.1/8081"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    deploy:
      resources:
        limits:
          # Uploads up to 2 GB stream through bot-api; tdlib buffers parts
          # of the request in memory. 1 GB OOM-kills mid-upload — 3 GB is
          # the headroom recommended by the upstream community.
          cpus: '1.0'
          memory: 3G
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - telegram_bot

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: progress_tracker
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d progress_tracker"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - telegram_bot

  bot-app:
    build:
      context: .
      target: prod
    restart: unless-stopped
    # ffmpeg compiles can run 60 s+ inside an `asyncio.create_task`; the
    # default 10 s grace SIGKILLs a render mid-stream. 90 s lets the
    # signal handler in __main__._run unwind through its `finally` block.
    stop_grace_period: 90s
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/progress_tracker
      MEDIA_DIR: /data/media
      # bot-app reaches the bot-api server over the shared docker network.
      BOT_API_URL: http://telegram-bot-api:8081
      # Local-files mode: bot-app reads source videos directly from the
      # bot-api data directory (mounted read-only below) instead of
      # downloading them over HTTP.
      BOT_API_LOCAL_FILES: "true"
      BOT_API_LOCAL_ROOT: /var/lib/telegram-bot-api
      # Defensively zero out the dev-from-home-only env vars in case the
      # operator copied a dev `.env` over. The pydantic-settings validator
      # in `config.py` maps "" -> None for the optional fields so this is
      # equivalent to "unset" semantically.
      SOCKS_PROXY_URL: ""
      BOT_API_USERNAME: ""
      BOT_API_PASSWORD: ""
    command: sh -c "alembic upgrade head && exec python -m progress_tracker"
    depends_on:
      db:
        condition: service_healthy
      telegram-bot-api:
        condition: service_healthy
    volumes:
      - media_data:/data/media
      # Same host directory bot-api writes to, mounted read-only here. The
      # absolute paths bot-api returns from `getFile` (e.g. /var/lib/...)
      # are valid inside this container thanks to this mount.
      - ./telegram-bot-api-data:/var/lib/telegram-bot-api:ro
    networks:
      - telegram_bot

volumes:
  db_data:
  media_data:

networks:
  telegram_bot:
